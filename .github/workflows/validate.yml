name: Validate pilot skill pack

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate pack
        run: node scripts/validate-pack.mjs .

      - name: Run adapter and command-policy harness
        run: node scripts/test-pack.mjs

      - name: Run built-in Node tests
        run: node --test
