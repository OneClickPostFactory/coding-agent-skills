name: Validate pilot skill pack

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate pack
        run: node scripts/validate-pack.mjs .

      - name: Run adapter and command-policy harness
        run: node scripts/test-pack.mjs

      - name: Validate disposable external adapter
        run: node scripts/validate-adapters.mjs tests/fixtures/external-adapters/valid-basic

      - name: Validate disposable project installation
        run: node scripts/validate-project-adapters.mjs tests/fixtures/project-adapter-installation/valid-exact-pin

      - name: Check disposable adapter upgrade
        run: node scripts/check-adapter-upgrade.mjs tests/fixtures/project-adapter-upgrades/valid-upgrade/before tests/fixtures/project-adapter-upgrades/valid-upgrade/after

      - name: Run built-in Node tests
        run: node --test
